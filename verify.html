<!DOCTYPE html>
<html>
<head>
<title>Verify TSE Passport</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
    :root { --gold: #D4AF37; --black: #0A0A0A; }
    body { font-family: 'Montserrat'; background: var(--black); color: var(--gold); padding: 20px; text-align: center; }
    h1 { font-family: 'Cinzel'; }
.card { background: #111; padding: 30px; border-radius: 15px; border: 2px solid var(--gold); max-width: 500px; margin: 20px auto; }
.valid { color: #00FF00; font-size: 24px; font-weight: bold; }
.invalid { color: #FF0000; font-size: 24px; font-weight: bold; }
.detail { text-align: left; margin: 10px 0; }
.loading { color: var(--gold); }
</style>
</head>
<body>
    <h1>👑 TEAM SINGLE EMPIRE 👑</h1>
    <h2>PASSPORT VERIFICATION</h2>
    <div class="card" id="result"><p class="loading">Loading...</p></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCLYTxgmlbK3BDj4f5jsDfCdf4fWgvH970",
    authDomain: "junior-ai-16d67.firebaseapp.com",
    databaseURL: "https://junior-ai-16d67-default-rtdb.firebaseio.com",
    projectId: "junior-ai-16d67",
    storageBucket: "junior-ai-16d67.firebasestorage.app",
    messagingSenderId: "72011020223",
    appId: "1:72011020223:web:ad988a6bae0454070f130a"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
  }

  const urlParams = new URLSearchParams(window.location.search);
  const passportNo = urlParams.get('no');

  if (!passportNo) {
    document.getElementById('result').innerHTML = '<p class="invalid">❌ NO PASSPORT NUMBER PROVIDED</p>';
  } else {
    db.ref('citizens/' + passportNo).once('value').then(snap => {
        if (snap.exists()) {
          const c = snap.val();
          document.getElementById('result').innerHTML = `
            <p class="valid">✅ VERIFIED CITIZEN</p>
            <div class="detail"><b>PASSPORT NO:</b> ${escapeHtml(c.no)}</div>
            <div class="detail"><b>ROYAL NAME:</b> ${escapeHtml(c.jina).toUpperCase()}</div>
            <div class="detail"><b>STATUS:</b> Certified Single</div>
            <div class="detail"><b>EMBASSY:</b> ${escapeHtml(c.embassy || 'N/A').toUpperCase()}</div>
            <div class="detail"><b>LAST BETRAYAL:</b> ${escapeHtml(c.oshwa)}</div>
            <div class="detail"><b>DECREED:</b> ${escapeHtml(c.date)}</div>
            <p style="margin-top:20px; font-size:12px;">LONG LIVE THE EMPIRE</p>
          `;
        } else {
          document.getElementById('result').innerHTML = '<p class="invalid">❌ FAKE PASSPORT<br>This citizen does not exist in the Empire</p>';
        }
      }).catch(err => {
        document.getElementById('result').innerHTML = '<p class="invalid">❌ DATABASE ERROR<br>Unable to verify at this time</p>';
      });
  }
</script>
</body>
</html>
